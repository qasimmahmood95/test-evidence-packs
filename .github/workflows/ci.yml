name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4 # version comes from packageManager in package.json

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint

      - run: pnpm typecheck

      - run: pnpm test

      - run: pnpm build

      - name: Run the demo suite
        run: pnpm demo:test

      - name: Generate the demo evidence pack
        run: node dist/cli.js generate --report demo/report.json --controls demo/controls.yaml --out demo/evidence --fail-on-failures

      - name: Verify the pack (ledger chain + file hashes)
        run: node dist/cli.js verify demo/evidence

      - name: Upload the evidence pack as a workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: demo-evidence-pack
          path: demo/evidence
